name: Build APK

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:  # Allows manual trigger from GitHub website

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Download Roboto Thin font
        run: |
          mkdir -p app/src/main/res/font
          curl -L "https://github.com/google/fonts/raw/main/apache/roboto/static/Roboto-Thin.ttf" \
            -o app/src/main/res/font/roboto_thin.ttf

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartAlarmClock-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
